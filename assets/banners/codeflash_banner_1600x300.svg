<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 300" width="1600" height="300">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0C0E14"/>
      <stop offset="100%" stop-color="#141824"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5BF0A5" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#5BF0A5" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1600" height="300" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <g stroke="#5BF0A5" stroke-opacity="0.04" stroke-width="0.5">
    <line x1="0" y1="60" x2="1600" y2="60"/>
    <line x1="0" y1="120" x2="1600" y2="120"/>
    <line x1="0" y1="180" x2="1600" y2="180"/>
    <line x1="0" y1="240" x2="1600" y2="240"/>
    <line x1="200" y1="0" x2="200" y2="300"/>
    <line x1="400" y1="0" x2="400" y2="300"/>
    <line x1="600" y1="0" x2="600" y2="300"/>
    <line x1="800" y1="0" x2="800" y2="300"/>
    <line x1="1000" y1="0" x2="1000" y2="300"/>
    <line x1="1200" y1="0" x2="1200" y2="300"/>
    <line x1="1400" y1="0" x2="1400" y2="300"/>
  </g>

  <!-- Decorative floating code snippets — left side -->
  <g font-family="'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace" font-size="11" fill="#5BF0A5" opacity="0.12">
    <text x="60" y="55">const learn = (concept) =&gt; {</text>
    <text x="80" y="72">return flashcard.flip();</text>
    <text x="60" y="89">};</text>
    <text x="40" y="130">async function master(skill) {</text>
    <text x="60" y="147">await practice(skill);</text>
    <text x="60" y="164">return expertise;</text>
    <text x="40" y="181">}</text>
    <text x="55" y="225">SELECT knowledge FROM cards</text>
    <text x="55" y="242">WHERE retention = 'permanent';</text>
  </g>

  <!-- Decorative floating code snippets — right side -->
  <g font-family="'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace" font-size="11" fill="#5BF0A5" opacity="0.12">
    <text x="1180" y="50">fn grow() -&gt; Result&lt;Career&gt; {</text>
    <text x="1200" y="67">let skills = deck.study()?;</text>
    <text x="1200" y="84">Ok(skills.apply())</text>
    <text x="1180" y="101">}</text>
    <text x="1200" y="155">func retain(card *Card) {</text>
    <text x="1220" y="172">card.Review()</text>
    <text x="1220" y="189">card.Remember()</text>
    <text x="1200" y="206">}</text>
    <text x="1190" y="252">import { mastery } from 'codedeck';</text>
    <text x="1190" y="269">export default mastery;</text>
  </g>

  <!-- Top accent line -->
  <rect x="0" y="0" width="1600" height="3" fill="#5BF0A5" opacity="0.6"/>

  <!-- Glow behind text -->
  <ellipse cx="800" cy="140" rx="400" ry="120" fill="url(#glow)"/>

  <!-- Card icon -->
  <g transform="translate(618, 88)">
    <!-- Back card -->
    <rect x="6" y="6" width="52" height="68" rx="6" fill="none" stroke="#5BF0A5" stroke-width="1.5" opacity="0.3"/>
    <!-- Front card -->
    <rect x="0" y="0" width="52" height="68" rx="6" fill="#1C2030" stroke="#5BF0A5" stroke-width="1.5"/>
    <!-- Flash symbol on card -->
    <path d="M22 18L28 32H20L26 50" fill="none" stroke="#5BF0A5" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Title -->
  <text x="690" y="140" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="48" font-weight="700" fill="#FFFFFF" letter-spacing="-1.5">
    Code<tspan fill="#5BF0A5">Flash</tspan>
  </text>

  <!-- Subtitle -->
  <text x="800" y="178" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="16" fill="#8B8D95" text-anchor="middle" letter-spacing="0.5">
    Developer Flashcards That Stick
  </text>

  <!-- Tag pills -->
  <g font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="10" font-weight="500">
    <!-- Pill backgrounds -->
    <rect x="520" y="200" width="80" height="24" rx="12" fill="#5BF0A5" fill-opacity="0.1" stroke="#5BF0A5" stroke-width="0.5" stroke-opacity="0.3"/>
    <rect x="612" y="200" width="65" height="24" rx="12" fill="#5B9DF0" fill-opacity="0.1" stroke="#5B9DF0" stroke-width="0.5" stroke-opacity="0.3"/>
    <rect x="689" y="200" width="68" height="24" rx="12" fill="#F0C05B" fill-opacity="0.1" stroke="#F0C05B" stroke-width="0.5" stroke-opacity="0.3"/>
    <rect x="769" y="200" width="62" height="24" rx="12" fill="#F05B8D" fill-opacity="0.1" stroke="#F05B8D" stroke-width="0.5" stroke-opacity="0.3"/>
    <rect x="843" y="200" width="55" height="24" rx="12" fill="#A05BF0" fill-opacity="0.1" stroke="#A05BF0" stroke-width="0.5" stroke-opacity="0.3"/>
    <rect x="910" y="200" width="80" height="24" rx="12" fill="#5BF0A5" fill-opacity="0.1" stroke="#5BF0A5" stroke-width="0.5" stroke-opacity="0.3"/>
    <rect x="1002" y="200" width="78" height="24" rx="12" fill="#5B9DF0" fill-opacity="0.1" stroke="#5B9DF0" stroke-width="0.5" stroke-opacity="0.3"/>
    <!-- Pill text -->
    <text x="560" y="216" fill="#5BF0A5" text-anchor="middle">REACT</text>
    <text x="644" y="216" fill="#5B9DF0" text-anchor="middle">PYTHON</text>
    <text x="723" y="216" fill="#F0C05B" text-anchor="middle">AWS</text>
    <text x="800" y="216" fill="#F05B8D" text-anchor="middle">RUST</text>
    <text x="870" y="216" fill="#A05BF0" text-anchor="middle">K8S</text>
    <text x="950" y="216" fill="#5BF0A5" text-anchor="middle">CYBERSEC</text>
    <text x="1041" y="216" fill="#5B9DF0" text-anchor="middle">DOCKER</text>
  </g>

  <!-- Stats bar at bottom -->
  <rect x="0" y="260" width="1600" height="40" fill="#0A0C10" fill-opacity="0.6"/>
  <g font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="11" fill="#8B8D95" text-anchor="middle">
    <text x="500" y="284"><tspan fill="#5BF0A5" font-weight="700">73</tspan> Packs</text>
    <text x="660" y="284"><tspan fill="#5BF0A5" font-weight="700">1,460+</tspan> Cards</text>
    <text x="840" y="284"><tspan fill="#5BF0A5" font-weight="700">9</tspan> Specializations</text>
    <text x="1040" y="284"><tspan fill="#5BF0A5" font-weight="700">HTML + PDF</tspan></text>
  </g>

  <!-- Bottom accent line -->
  <rect x="0" y="297" width="1600" height="3" fill="#5BF0A5" opacity="0.4"/>
</svg>
