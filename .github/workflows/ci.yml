name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check for broken links
        run: |
          echo "Checking for broken internal links..."
          find . -name '*.html' -not -path '*/node_modules/*' | while read f; do
            grep -oP 'href="(?!http|mailto|tel|#)([^"]+)"' "$f" | sed 's/href="//;s/"//' | while read link; do
              dir=$(dirname "$f")
              if [ ! -f "$dir/$link" ] && [ ! -f "$link" ]; then
                echo "⚠ Broken link in $f: $link"
              fi
            done
          done
          echo "✅ Link check complete"
